<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約キャンセル | Relaxation salon Raku</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sage: #7a9a7a; --sage-light: #c8d8c0; --sage-pale: #f0f5ee;
      --ink: #2c2c2c; --ink-light: #666; --border: #d8e4d0; --white: #fff; --error: #c0392b;
    }
    body { font-family: 'Noto Serif JP', serif; background: var(--sage-pale); color: var(--ink); min-height: 100vh; }
    header { background: var(--white); border-bottom: 1px solid var(--border); text-align: center; padding: 28px 20px 20px; }
    header h1 { font-size: 1.4rem; font-weight: 400; letter-spacing: .18em; }
    header p { font-size: .78rem; color: var(--ink-light); margin-top: 4px; letter-spacing: .08em; }
    main { max-width: 560px; margin: 40px auto; padding: 0 16px 60px; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 32px 28px; }
    .card-title { font-size: 1rem; font-weight: 500; letter-spacing: .12em; margin-bottom: 24px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .confirm-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
    .confirm-table tr { border-bottom: 1px solid var(--border); }
    .confirm-table td { padding: 12px 8px; font-size: .88rem; vertical-align: top; }
    .confirm-table td:first-child { width: 36%; color: var(--ink-light); font-size: .78rem; letter-spacing: .06em; }
    .btn-danger {
      display: block; width: 100%; background: #c0392b; color: var(--white); border: none;
      border-radius: 4px; padding: 15px; font-family: inherit; font-size: .92rem; letter-spacing: .12em;
      cursor: pointer; transition: background .15s;
    }
    .btn-danger:hover { background: #a93226; }
    .btn-danger:disabled { background: #aaa; cursor: not-allowed; }
    .done-card { text-align: center; padding: 48px 28px; }
    .done-icon { width: 60px; height: 60px; border: 1px solid var(--sage-light); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
    .done-icon svg { width: 28px; height: 28px; }
    .done-title { font-size: 1.1rem; font-weight: 500; letter-spacing: .14em; margin-bottom: 12px; }
    .done-msg { font-size: .84rem; color: var(--ink-light); line-height: 1.9; }
    .error-card { text-align: center; padding: 48px 28px; }
    .error-title { font-size: 1rem; color: var(--error); margin-bottom: 12px; }
    .error-msg { font-size: .84rem; color: var(--ink-light); }
    .loading { text-align: center; color: var(--ink-light); font-size: .84rem; padding: 40px; }
  </style>
</head>
<body>
<header>
  <h1>予約キャンセル</h1>
  <p>Relaxation salon Raku</p>
</header>
<main>
  <div class="card" id="loadingCard"><div class="loading">予約情報を読み込み中...</div></div>
  <div class="card" id="reservationCard" style="display:none">
    <div class="card-title">以下の予約をキャンセルしますか？</div>
    <table class="confirm-table">
      <tr><td>メニュー</td><td id="dMenu">—</td></tr>
      <tr><td>日時</td><td id="dDate">—</td></tr>
      <tr><td>お名前</td><td id="dName">—</td></tr>
    </table>
    <button class="btn-danger" id="btnCancel" onclick="doCancel()">この予約をキャンセルする</button>
  </div>
  <div class="card done-card" id="doneCard" style="display:none">
    <div class="done-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7a9a7a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="done-title">キャンセルが完了しました</div>
    <div class="done-msg">またのご予約をお待ちしております。</div>
  </div>
  <div class="card error-card" id="errorCard" style="display:none">
    <div class="error-title">予約情報が見つかりません</div>
    <div class="error-msg">すでにキャンセル済みか、URLが正しくない可能性があります。</div>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA7DY0iwx38gGsAzM-RbX-bxkQaCzu6XyA",
    authDomain: "relaxation-salon-raku.firebaseapp.com",
    projectId: "relaxation-salon-raku",
    storageBucket: "relaxation-salon-raku.appspot.com",
    messagingSenderId: "961657852734",
    appId: "1:961657852734:web:3c282c0cb866fe6ca3926f"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(location.search);
  const reservationId = params.get("id");

  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function show(id) { document.getElementById(id).style.display = 'block'; }

  async function loadReservation() {
    if (!reservationId) { hide("loadingCard"); show("errorCard"); return; }
    try {
      const q = query(collection(db, "reservations"), where("reservationId", "==", reservationId));
      const snap = await getDocs(q);
      if (snap.empty) { hide("loadingCard"); show("errorCard"); return; }

      const d = snap.docs[0].data();
      window._reservationDocId = snap.docs[0].id;
      window._reservationData = d;

      const dateObj = new Date(d.date + 'T00:00:00');
      const days = ["日","月","火","水","木","金","土"];
      const dateStr = `${dateObj.getFullYear()}年${dateObj.getMonth()+1}月${dateObj.getDate()}日（${days[dateObj.getDay()]}）`;

      document.getElementById("dMenu").textContent = d.menu || "—";
      document.getElementById("dDate").textContent = `${dateStr} ${d.time}〜`;
      document.getElementById("dName").textContent = d.name || "—";

      hide("loadingCard"); show("reservationCard");
    } catch(e) {
      console.error(e);
      hide("loadingCard"); show("errorCard");
    }
  }

  window.doCancel = async function() {
    const btn = document.getElementById("btnCancel");
    btn.disabled = true; btn.textContent = "処理中...";
    try {
      const q = query(collection(db, "reservations"), where("reservationId", "==", reservationId));
      const snap = await getDocs(q);
      if (!snap.empty) await deleteDoc(snap.docs[0].ref);

      const d = window._reservationData;
      if (d && d.email) {
        const params = {
          customer_name: d.name,
          customer_email: d.email,
          menu_name: d.menu || "—",
          date: document.getElementById("dDate").textContent,
          time: d.time + "〜",
          greeting: "ご予約のキャンセルを承りました。",
          subject: "【Raku】ご予約のキャンセルを承りました"
        };
        await emailjs.send("service_bnt9a2u", "template_jc40kl6", params);
      }

      hide("reservationCard"); show("doneCard");
    } catch(e) {
      console.error(e);
      btn.disabled = false; btn.textContent = "この予約をキャンセルする";
      alert("エラーが発生しました。\nしばらく経ってから再度お試しください。");
    }
  };

  loadReservation();
</script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("M4ezlu15f5F7gi5aY");</script>
</body>
</html>
